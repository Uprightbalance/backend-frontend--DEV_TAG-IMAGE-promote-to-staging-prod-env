---
name: Promote Services to Staging

"on":
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Promote Backend and Frontend Images
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          git clone https://github.com/Uprightbalance/gitops-repo.git
          cd gitops-repo

          git remote set-url origin \
          https://$GITOPS_TOKEN@github.com/Uprightbalance/gitops-repo.git

          BACKEND_TAG=$(grep "newTag:" \
          k8s/backend/dev/kustomization.yaml | awk '{print $2}')

          FRONTEND_TAG=$(grep "newTag:" \
          k8s/frontend/dev/kustomization.yaml | awk '{print $2}')

          sed -i "s|newTag:.*|newTag: $BACKEND_TAG|" \
          k8s/backend/staging/kustomization.yaml

          sed -i "s|newTag:.*|newTag: $FRONTEND_TAG|" \
          k8s/frontend/staging/kustomization.yaml

          git config user.email "uprightojieh316@gmail.com"
          git config user.name "github-actions"

          git add .

          git commit -m \
          "promote backend $BACKEND_TAG and frontend $FRONTEND_TAG to staging" \
          || echo "No changes to commit"

          for i in {1..5}; do
            git pull origin main --rebase
            git push origin main && break
            echo "Push failed. Retrying..."
            sleep 3
          done
