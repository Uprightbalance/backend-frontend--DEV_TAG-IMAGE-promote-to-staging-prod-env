name: Promote Frontend to Staging

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Promote Frontend Image
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          git clone https://github.com/Uprightbalance/gitops-repo.git
          cd gitops-repo

          git remote set-url origin https://$GITOPS_TOKEN@github.com/Uprightbalance/gitops-repo.git

          DEV_TAG=$(grep "newTag:" k8s/frontend/dev/kustomization.yaml | awk '{print $2}')
          echo "Dev tag: $DEV_TAG"

          sed -i "s|newTag:.*|newTag: $DEV_TAG|" k8s/frontend/staging/kustomization.yaml

          echo "Updated staging file:"
          cat k8s/frontend/staging/kustomization.yaml

          git config user.email "uprightojieh316@gmail.com"
          git config user.name "github-actions"

          git add .

          git commit -m "promote frontend $DEV_TAG to staging" || echo "No changes to commit"

          git pull origin main --rebase

          git push origin main
